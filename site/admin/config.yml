backend:
  name: github
  repo: sebtautou-max/vactennis
  branch: main
  base_url: https://oauth-proxy.sebtautou.workers.dev
  auth_endpoint: auth

media_folder: "img/uploads"
public_folder: "/img/uploads"

collections:
  - name: "actualites"
    label: "Actualités"
    folder: "actualites"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Titre", name: "title", widget: "string" }
      - { label: "Catégorie", name: "category", widget: "select", options: ["Tournoi", "Stage", "Compétition", "Club", "Résultats"], required: false }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Image", name: "image", widget: "image", required: false, hint: "Formats acceptés : JPG ou JPEG uniquement. Taille recommandée : 800x500px.", media_library: {config: {multiple: false}} }
      - { label: "Contenu", name: "body", widget: "markdown" }
